# Detect write operations (read-only mode)
# ⚠️ Example hook — designed as a starting point. Test and customize for your environment.
#
# Event:      PostToolUse (runs AFTER the tool has executed)
# Type:       Command (Python)
# Matcher:    Bash|ExecuteShellCommand|ExecutePythonCode
# Activation: On Demand
#
# Detects write/modification operations after execution and flags them.
# Allows read/diagnostic operations to pass through.
# ⚠️ This hook does NOT prevent write operations — they have already executed.
# For true read-only enforcement, use a Reader-only RBAC role on the managed identity.
# Set to On Demand — toggle on for safe demos, off for remediation demos.

hooks:
  PostToolUse:
    - type: command
      matcher: "Bash|ExecuteShellCommand|ExecutePythonCode"
      timeout: 30
      failMode: block
      script: |
        #!/usr/bin/env python3
        import sys, json, re

        context = json.load(sys.stdin)
        tool_input = context.get('tool_input', {})
        command = ''
        if isinstance(tool_input, dict):
            command = tool_input.get('command', '') or tool_input.get('code', '')

        # Compound commands (e.g. "az vm show; az vm delete") would otherwise bypass detection
        # because re.search would match the read-only prefix first. Evaluate each sub-command
        # separately: if ANY segment is a modification command, flag the whole thing.
        segments = re.split(r'\s*(?:&&|\|\||;|\n)\s*', command)
        segments = [s.strip() for s in segments if s.strip()]

        # Allowed read-only patterns (Azure CLI)
        readonly_patterns = [
            r'az\s+\S+\s+(show|list|get)',
            r'az\s+monitor\s+metrics\s+list',
            r'az\s+vm\s+run-command\s+invoke',   # run-command needed for diagnostics
            r'az\s+vm\s+get-instance-view',
            r'az\s+network\s+(nsg|nic|vnet)\s+(show|list)',
            r'az\s+resource\s+(show|list)',
            r'az\s+backup\s+.*\s+(show|list)',
        ]

        # Diagnostic shell commands (always safe)
        safe_commands = [
            r'^(cat|head|tail|less|grep|awk|sed|wc|sort|uniq|find|ls|df|du|free|top|ps|uptime|vmstat|iostat|netstat|ss|ip|dig|nslookup|curl|wget|journalctl|systemctl\s+status|dmesg|lsblk|mount|fdisk\s+-l)\b',
        ]

        # Block modification commands
        modify_patterns = [
            r'az\s+\S+\s+(create|update|delete|start|stop|restart|resize|set)',
            r'\b(rm|mv|cp|chmod|chown|mkdir|touch|tee|sed\s+-i|dd)\b',
            r'\b(systemctl\s+(start|stop|restart|enable|disable))\b',
            r'\b(apt|yum|dnf|pip)\s+install\b',
        ]

        # If any segment matches a modify pattern, flag it (takes precedence over read-only match)
        for seg in segments:
            for pattern in modify_patterns:
                if re.search(pattern, seg, re.IGNORECASE):
                    print(json.dumps({
                        "decision": "block",
                        "reason": f"🔒 Read-only mode: Detected modifying operation in segment '{seg[:120]}'. Only diagnostic (read) operations are allowed."
                    }))
                    sys.exit(0)

        # Otherwise: if every segment is a known read-only/safe pattern, allow
        if segments and all(
            any(re.search(p, seg, re.IGNORECASE) for p in readonly_patterns + safe_commands)
            for seg in segments
        ):
            print(json.dumps({"decision": "allow"}))
            sys.exit(0)

        # Default: allow unknown commands (safe default for diagnostics — they're read-only by convention)
        print(json.dumps({"decision": "allow"}))
