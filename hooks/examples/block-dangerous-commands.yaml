# Detect dangerous shell commands
# ⚠️ Example hook — designed as a starting point. Test and customize for your environment.
#
# Event:      PostToolUse (runs AFTER the tool has executed)
# Type:       Command (Python)
# Matcher:    Bash|ExecuteShellCommand
# Activation: Always
#
# Detects destructive operations (rm -rf, sudo, chmod 777, DROP TABLE, etc.)
# after they have executed. Flags the violation and provides an audit trail.
# ⚠️ This hook does NOT prevent execution — it detects it after the fact.
# For true prevention, use RBAC or Review mode.
# Use as an always-on agent-level hook for any environment with shell access.

hooks:
  PostToolUse:
    - type: command
      matcher: "Bash|ExecuteShellCommand"
      timeout: 30
      failMode: block
      script: |
        #!/usr/bin/env python3
        import sys, json, re

        context = json.load(sys.stdin)
        command = context.get('tool_input', {}).get('command', '')

        dangerous = [
            (r'\brm\s+-rf\b', 'rm -rf (recursive force delete)'),
            (r'\bsudo\b', 'sudo (privilege escalation)'),
            (r'\bchmod\s+777\b', 'chmod 777 (world-writable permissions)'),
            (r'\bdrop\s+(table|database)\b', 'DROP TABLE/DATABASE (irreversible)'),
            (r'\btruncate\s+table\b', 'TRUNCATE TABLE (data wipe)'),
            # Evaluated per-statement below (split on ;) so a trailing WHERE on a later
            # statement can't mask an earlier unconditional DELETE FROM.
            (r'\bdelete\s+from\b(?!.*\bwhere\b)', 'DELETE FROM without WHERE (full table wipe)'),
            (r'\bmkfs\b', 'mkfs (format filesystem)'),
        ]

        # Split SQL/shell compound commands so lookaheads only see the same statement.
        statements = [s.strip() for s in re.split(r'[;\n]', command) if s.strip()]
        if not statements:
            statements = [command]

        for stmt in statements:
            for pattern, label in dangerous:
                if re.search(pattern, stmt, re.IGNORECASE):
                    print(json.dumps({
                        "decision": "block",
                        "reason": f"🛑 Detected: {label}. Use safe, non-destructive alternatives."
                    }))
                    sys.exit(0)

        print(json.dumps({"decision": "allow"}))
